# Suggested nginx configuration changes for testing
# Add this to the nginx.conf to allow higher rate limits for testing

# In the http block, modify the rate limiting zones:

# Option 1: Increase rate limit for all requests (simple but affects production)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;  # Changed from 10r/s

# Option 2: Conditional rate limiting based on source (recommended)
geo $rate_limit {
    default 1;
    127.0.0.1/32 0;  # Disable rate limiting for localhost
    ::1/128 0;       # Disable rate limiting for IPv6 localhost
    172.16.0.0/12 0; # Disable for Docker networks
    192.168.0.0/16 0; # Disable for local networks
}

map $rate_limit $limit_key {
    0 "";
    1 $binary_remote_addr;
}

limit_req_zone $limit_key zone=api_limit:10m rate=10r/s;
limit_req_zone $limit_key zone=auth_limit:10m rate=3r/s;

# In the location blocks, add burst parameter:
location /api/v1 {
    limit_req zone=api_limit burst=20 nodelay;  # Allow burst of 20 requests
    # ... rest of config
}