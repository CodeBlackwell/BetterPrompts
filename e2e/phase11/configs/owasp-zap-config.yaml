# OWASP ZAP Configuration for BetterPrompts Security Testing
# This configuration is used for automated security scanning

env:
  contexts:
    - name: "BetterPrompts"
      urls:
        - "http://localhost:3000"
        - "http://localhost/api/v1"
      includePaths:
        - "http://localhost:3000/.*"
        - "http://localhost/api/v1/.*"
      excludePaths:
        - ".*\\.js"
        - ".*\\.css"
        - ".*\\.png"
        - ".*\\.jpg"
        - ".*\\.gif"
        - ".*\\.svg"
      authentication:
        method: "json"
        loginUrl: "http://localhost/api/v1/auth/login"
        loginRequestData: '{"email":"{%username%}","password":"{%password%}"}'
        usernameParameter: "email"
        passwordParameter: "password"
      users:
        - name: "testuser"
          credentials:
            username: "test@betterprompts.ai"
            password: "SecureTestPass123!"
        - name: "adminuser"
          credentials:
            username: "admin@betterprompts.ai"
            password: "AdminSecurePass123!"

policies:
  defaultPolicy: "Default Policy"
  scanPolicies:
    - name: "BetterPrompts Security Policy"
      rules:
        # SQL Injection
        - id: 40018  # SQL Injection
          strength: "HIGH"
          threshold: "LOW"
        - id: 40019  # SQL Injection - MySQL
          strength: "HIGH"
          threshold: "LOW"
        - id: 40020  # SQL Injection - Hypersonic
          strength: "HIGH"
          threshold: "LOW"
        - id: 40021  # SQL Injection - Oracle
          strength: "HIGH"
          threshold: "LOW"
        - id: 40022  # SQL Injection - PostgreSQL
          strength: "HIGH"
          threshold: "LOW"
        
        # Cross Site Scripting
        - id: 40012  # Cross Site Scripting (Reflected)
          strength: "HIGH"
          threshold: "LOW"
        - id: 40014  # Cross Site Scripting (Persistent)
          strength: "HIGH"
          threshold: "LOW"
        - id: 40016  # Cross Site Scripting (Persistent) - Prime
          strength: "HIGH"
          threshold: "LOW"
        - id: 40017  # Cross Site Scripting (Persistent) - Spider
          strength: "HIGH"
          threshold: "LOW"
        
        # Authentication
        - id: 10011  # Cookie Without Secure Flag
          strength: "HIGH"
          threshold: "LOW"
        - id: 10012  # Password Autocomplete
          strength: "MEDIUM"
          threshold: "LOW"
        - id: 10015  # Incomplete or No Cache-control and Pragma HTTP Header Set
          strength: "MEDIUM"
          threshold: "LOW"
        
        # Session Management
        - id: 10010  # Cookie No HttpOnly Flag
          strength: "HIGH"
          threshold: "LOW"
        - id: 10054  # Cookie Without SameSite Attribute
          strength: "MEDIUM"
          threshold: "LOW"
        
        # Security Misconfiguration
        - id: 10021  # X-Content-Type-Options Header Missing
          strength: "MEDIUM"
          threshold: "LOW"
        - id: 10023  # Information Disclosure - Debug Error Messages
          strength: "HIGH"
          threshold: "LOW"
        - id: 10027  # Information Disclosure - Suspicious Comments
          strength: "LOW"
          threshold: "MEDIUM"
        
        # XXE
        - id: 90023  # XML External Entity Attack
          strength: "HIGH"
          threshold: "LOW"

jobs:
  - type: spider
    parameters:
      maxDuration: 10  # minutes
      maxChildren: 10
      recurse: true
      subtreeOnly: true
      
  - type: ajaxSpider
    parameters:
      maxDuration: 10  # minutes
      browserId: "chrome-headless"
      
  - type: passiveScan-wait
    parameters:
      maxDuration: 5  # minutes
      
  - type: activeScan
    parameters:
      context: "BetterPrompts"
      policy: "BetterPrompts Security Policy"
      maxRuleDurationInMins: 5
      maxScanDurationInMins: 60
      
  - type: report
    parameters:
      template: "risk-confidence-html"
      reportDir: "/zap/reports"
      reportFile: "betterprompts-security-report"
      reportTitle: "BetterPrompts OWASP Security Test Report"
      reportDescription: "Automated security scan results for BetterPrompts application"

reporting:
  reports:
    - type: "html"
      template: "traditional-html-plus"
      reportDir: "reports"
      reportFile: "ZAP-Report-{timestamp}"
      title: "BetterPrompts Security Assessment"
      
    - type: "json"
      template: "traditional-json"
      reportDir: "reports"
      reportFile: "ZAP-Report-{timestamp}"
      
    - type: "xml"
      template: "traditional-xml"
      reportDir: "reports"
      reportFile: "ZAP-Report-{timestamp}"

alertFilters:
  # Filter out false positives
  - ruleId: 10015  # Ignore cache control on static assets
    url: ".*\\.(js|css|png|jpg|gif|svg)"
    enabled: false
    
  - ruleId: 10027  # Ignore suspicious comments in minified files
    url: ".*\\.min\\.js"
    enabled: false

replacer:
  # Add authentication headers to all requests
  - description: "Add auth token"
    enabled: true
    matchType: "REQ_HEADER"
    matchString: "Authorization"
    replacement: "Bearer {%auth_token%}"
    initiators: "ALL"