openapi: 3.0.3
info:
  title: BetterPrompts API
  description: Enterprise API for AI-powered prompt enhancement
  version: 1.0.0
  contact:
    name: BetterPrompts Support
    email: support@betterprompts.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost/api/v1
    description: Local development server
  - url: https://api.betterprompts.io/v1
    description: Production server

security:
  - ApiKeyAuth: []
  - BearerAuth: []

paths:
  /enhance:
    post:
      summary: Enhance a prompt
      description: Analyze and enhance a prompt using AI-powered techniques
      operationId: enhancePrompt
      tags:
        - Enhancement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhanceRequest'
      responses:
        '200':
          description: Successful enhancement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhanceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /batch:
    post:
      summary: Batch enhance prompts
      description: Submit multiple prompts for asynchronous enhancement
      operationId: batchEnhance
      tags:
        - Enhancement
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requests
              properties:
                requests:
                  type: array
                  items:
                    $ref: '#/components/schemas/EnhanceRequest'
                  minItems: 1
                  maxItems: 100
      responses:
        '202':
          description: Batch job accepted
          content:
            application/json:
              schema:
                type: object
                required:
                  - job_id
                properties:
                  job_id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /techniques:
    get:
      summary: List available techniques
      description: Get all available prompt enhancement techniques
      operationId: getTechniques
      tags:
        - Techniques
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [reasoning, creative, analytical, instructional]
        - name: complexity
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: List of techniques
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Technique'

  /history:
    get:
      summary: Get prompt history
      description: Retrieve paginated prompt enhancement history
      operationId: getHistory
      tags:
        - History
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
        - name: intent
          in: query
          schema:
            type: string
        - name: technique
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /history/{id}:
    get:
      summary: Get history item
      description: Retrieve a specific prompt history item
      operationId: getHistoryItem
      tags:
        - History
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: History item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete history item
      description: Soft delete a prompt history item
      operationId: deleteHistoryItem
      tags:
        - History
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Successfully deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /stats:
    get:
      summary: Get usage statistics
      description: Retrieve usage statistics and metrics
      operationId: getStats
      tags:
        - Analytics
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: Usage statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks:
    post:
      summary: Create webhook
      description: Register a new webhook endpoint
      operationId: createWebhook
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookConfig'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - secret
                properties:
                  id:
                    type: string
                    format: uuid
                  secret:
                    type: string
                    description: HMAC secret for signature validation

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortByParam:
      name: sort_by
      in: query
      schema:
        type: string
        default: created_at
    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:
    EnhanceRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
        context:
          type: object
          additionalProperties: true
        prefer_techniques:
          type: array
          items:
            type: string
        exclude_techniques:
          type: array
          items:
            type: string
        target_complexity:
          type: string
          enum: [simple, moderate, complex]

    EnhanceResponse:
      type: object
      required:
        - id
        - original_text
        - enhanced_text
        - intent
        - complexity
        - techniques_used
        - confidence
        - processing_time_ms
      properties:
        id:
          type: string
          format: uuid
        original_text:
          type: string
        enhanced_text:
          type: string
        enhanced_prompt:
          type: string
          description: Alias for enhanced_text
        intent:
          type: string
        complexity:
          type: string
        techniques:
          type: array
          items:
            type: string
        techniques_used:
          type: array
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        processing_time_ms:
          type: number
        enhanced:
          type: boolean
        metadata:
          type: object
          additionalProperties: true

    Technique:
      type: object
      required:
        - id
        - name
        - category
        - description
        - complexity
        - effectiveness
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        description:
          type: string
        complexity:
          type: integer
          minimum: 1
          maximum: 5
        examples:
          type: array
          items:
            type: string
        parameters:
          type: object
          additionalProperties: true
        effectiveness:
          type: object
          required:
            - overall
          properties:
            overall:
              type: number
              minimum: 0
              maximum: 1
            byIntent:
              type: object
              additionalProperties:
                type: number

    HistoryItem:
      type: object
      required:
        - id
        - user_id
        - original_text
        - enhanced_text
        - intent
        - complexity
        - techniques_used
        - confidence
        - processing_time_ms
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        original_text:
          type: string
        enhanced_text:
          type: string
        intent:
          type: string
        complexity:
          type: string
        techniques_used:
          type: array
          items:
            type: string
        confidence:
          type: number
        processing_time_ms:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object

    PaginatedHistory:
      type: object
      required:
        - items
        - total
        - page
        - limit
        - total_pages
        - has_next
        - has_prev
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean

    Stats:
      type: object
      required:
        - total_enhancements
        - techniques_usage
        - average_confidence
        - average_processing_time
      properties:
        total_enhancements:
          type: integer
        techniques_usage:
          type: object
          additionalProperties:
            type: integer
        average_confidence:
          type: number
        average_processing_time:
          type: number

    WebhookConfig:
      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum:
              - enhancement.completed
              - batch.finished
              - error.occurred
        active:
          type: boolean
          default: true

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
        request_id:
          type: string
          format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limited
      headers:
        X-RateLimit-Limit:
          schema:
            type: string
        X-RateLimit-Remaining:
          schema:
            type: string
        X-RateLimit-Reset:
          schema:
            type: string
        Retry-After:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'