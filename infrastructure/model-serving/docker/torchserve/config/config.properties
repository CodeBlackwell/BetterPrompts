# TorchServe Configuration for BetterPrompts

# Server configuration
inference_address=http://0.0.0.0:8080
management_address=http://0.0.0.0:8081
metrics_address=http://0.0.0.0:8082
grpc_inference_port=7070
grpc_management_port=7071

# Model store
model_store=/home/model-server/model-store
load_models=all

# Logging
log4j_config_file=/home/model-server/config/log4j2.xml

# Performance settings
default_workers_per_model=2
job_queue_size=100
batch_size=8
max_batch_delay=100

# GPU settings (will use GPU if available)
number_of_gpu=1
gpu_id=0

# Security settings
allowed_urls=file://.*,http://.*,https://.*
keystore=
private_key_file=
certificate_file=

# Model configuration
default_response_timeout=120
unregister_model_timeout=120
model_server_home=/home/model-server

# Metrics configuration
enable_metrics_api=true
metrics_format=prometheus
metrics_interval=60

# System settings
install_py_dep_per_model=true
enable_envvars_config=true
async_logging=true

# Threading
preload_model=true
model_snapshot={"name":"startup.cfg","modelCount":1,"models":{"intent_classifier":{"1.0":{"defaultVersion":true,"marName":"intent_classifier.mar","minWorkers":1,"maxWorkers":2,"batchSize":8,"maxBatchDelay":100,"responseTimeout":120}}}}

# Memory management
vmargs=-Xmx4g -Xms2g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+ParallelRefProcEnabled

# CORS settings (for API access)
cors_allowed_origin=*
cors_allowed_methods=GET, POST, PUT, DELETE, OPTIONS
cors_allowed_headers=*