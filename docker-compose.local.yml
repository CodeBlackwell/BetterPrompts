# Docker Compose configuration for local development
# This version runs without TorchServe for faster local development

services:
  # API Gateway - Main entry point for all API requests
  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    container_name: betterprompts-api-gateway
    ports:
      - "8090:8090"
    environment:
      - GIN_MODE=debug
      - PORT=8090
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://betterprompts:betterprompts@postgres:5432/betterprompts?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=dev-secret-change-in-production
      - RATE_LIMIT_REQUESTS_PER_MINUTE=60
      - RATE_LIMIT_BURST=20
      - REQUEST_TIMEOUT=30
      - ENABLE_DOCS=true
      - LOG_LEVEL=DEBUG
      - INTENT_CLASSIFIER_URL=http://intent-classifier:8001
      - TECHNIQUE_SELECTOR_URL=http://technique-selector:8002
      - PROMPT_GENERATOR_URL=http://prompt-generator:8003
    volumes:
      - ./backend/services/api-gateway:/app
      - go-cache:/go/pkg/mod
    networks:
      - betterprompts-network
    depends_on:
      - postgres
      - redis
      - intent-classifier
      - technique-selector
      - prompt-generator
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Intent Classification Service (without TorchServe)
  intent-classifier:
    build:
      context: ./backend/services/intent-classifier
      dockerfile: Dockerfile
    container_name: betterprompts-intent-classifier
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://betterprompts:betterprompts@postgres:5432/betterprompts?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - MODEL_NAME=microsoft/deberta-v3-base
      - LOG_LEVEL=DEBUG
      - USE_TORCHSERVE=false  # Disabled for local development
      - PYTHONPATH=/app
      - ENABLE_ADAPTIVE_ROUTING=true
      - ENABLE_ZERO_SHOT=true
    volumes:
      - ./backend/services/intent-classifier:/app
      - ./ml-pipeline/trained_models:/app/models  # Mount trained models directly
      - ml-cache:/app/cache
    networks:
      - betterprompts-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Technique Selection Engine
  technique-selector:
    build:
      context: ./backend/services/technique-selector
      dockerfile: Dockerfile
    container_name: betterprompts-technique-selector
    ports:
      - "8002:8002"
    environment:
      - GIN_MODE=debug
      - DATABASE_URL=postgresql://betterprompts:betterprompts@postgres:5432/betterprompts?sslmode=disable
      - REDIS_URL=redis://redis:6379/1
      - JWT_SECRET=dev-secret-change-in-production
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend/services/technique-selector:/app
      - go-cache:/go/pkg/mod
    networks:
      - betterprompts-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Prompt Generation Service
  prompt-generator:
    build:
      context: ./backend/services/prompt-generator
      dockerfile: Dockerfile
    container_name: betterprompts-prompt-generator
    ports:
      - "8003:8003"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://betterprompts:betterprompts@postgres:5432/betterprompts?sslmode=disable
      - REDIS_URL=redis://redis:6379/2
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app
    volumes:
      - ./backend/services/prompt-generator:/app
      - prompt-models:/app/models
    networks:
      - betterprompts-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx API Gateway
  nginx:
    image: nginx:alpine
    container_name: betterprompts-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - betterprompts-network
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: betterprompts-postgres
    environment:
      - POSTGRES_USER=betterprompts
      - POSTGRES_PASSWORD=betterprompts
      - POSTGRES_DB=betterprompts
      - POSTGRES_HOST_AUTH_METHOD=md5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - betterprompts-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betterprompts"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: betterprompts-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - betterprompts-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: betterprompts-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - betterprompts-network
    depends_on:
      - api-gateway
      - intent-classifier
      - technique-selector
      - prompt-generator

  # Grafana for visualization (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: betterprompts-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - betterprompts-network
    depends_on:
      - prometheus

networks:
  betterprompts-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  prompt-models:
  ml-cache:
  go-cache: